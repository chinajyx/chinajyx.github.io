<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>2048 · 经典</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }
    body {
      background: #faf8ef;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Segoe UI', 'Clear Sans', Arial, sans-serif;
    }
    .container {
      width: 100%;
      max-width: 500px;
      padding: 20px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .title {
      font-size: 2.5rem;
      font-weight: 700;
      color: #776e65;
      line-height: 1;
    }
    .score-box {
      background: #bbada0;
      color: white;
      padding: 8px 20px;
      border-radius: 6px;
      text-align: center;
      min-width: 80px;
    }
    .score-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.8;
    }
    .score-value {
      font-size: 1.8rem;
      font-weight: 700;
      line-height: 1.2;
    }
    .new-game-btn {
      background: #8f7a66;
      border: none;
      color: white;
      font-size: 1rem;
      font-weight: 700;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      letter-spacing: 0.3px;
    }
    .new-game-btn:hover {
      background: #9f8b76;
    }
    .new-game-btn:active {
      transform: scale(0.96);
    }
    .grid-container {
      background: #bbada0;
      border-radius: 8px;
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      aspect-ratio: 1 / 1;
      touch-action: none;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    }
    .cell {
      background: rgba(238, 228, 218, 0.35);
      border-radius: 6px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2.4rem;
      font-weight: 700;
      color: #776e65;
      transition: background 0.12s, transform 0.1s;
      aspect-ratio: 1 / 1;
      will-change: transform;
    }
    /* 不同数字的颜色 */
    .tile-2 { background: #eee4da; }
    .tile-4 { background: #ede0c8; }
    .tile-8 { background: #f2b179; color: #f9f6f2; }
    .tile-16 { background: #f59563; color: #f9f6f2; }
    .tile-32 { background: #f67c5f; color: #f9f6f2; }
    .tile-64 { background: #f65e3b; color: #f9f6f2; }
    .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 2.0rem; }
    .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 2.0rem; }
    .tile-512 { background: #edc850; color: #f9f6f2; font-size: 2.0rem; }
    .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 1.6rem; }
    .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 1.6rem; }
    .tile-super { background: #3c3a32; color: #f9f6f2; font-size: 1.4rem; }

    .game-message {
      text-align: center;
      margin-top: 18px;
      font-size: 1.1rem;
      font-weight: 600;
      color: #776e65;
      min-height: 2rem;
    }
    .game-message.win {
      color: #f67c5f;
    }
    .game-message.lose {
      color: #776e65;
    }

    @media (max-width: 520px) {
      .container { padding: 12px; }
      .title { font-size: 2rem; }
      .score-box { min-width: 60px; padding: 4px 12px; }
      .score-value { font-size: 1.4rem; }
      .grid-container { padding: 8px; gap: 8px; }
      .cell { font-size: 1.8rem; }
      .tile-128, .tile-256, .tile-512 { font-size: 1.5rem; }
      .tile-1024, .tile-2048 { font-size: 1.2rem; }
      .tile-super { font-size: 1rem; }
    }
    @media (max-width: 400px) {
      .grid-container { padding: 6px; gap: 6px; }
      .cell { font-size: 1.4rem; }
      .tile-128, .tile-256, .tile-512 { font-size: 1.2rem; }
      .tile-1024, .tile-2048 { font-size: 1rem; }
      .tile-super { font-size: 0.9rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <span class="title">2048</span>
    <div class="score-box">
      <div class="score-label">分数</div>
      <div class="score-value" id="scoreDisplay">0</div>
    </div>
    <button class="new-game-btn" id="newGameBtn">新游戏</button>
  </div>

  <div class="grid-container" id="gridContainer">
    <!-- 16 个格子由 js 动态生成 -->
  </div>

  <div id="gameMessage" class="game-message"></div>
</div>

<script>
  (function() {
    // ---------- 核心状态 ----------
    const SIZE = 4;
    let grid = [];
    let score = 0;
    let gameOver = false;
    let win = false;

    // DOM 元素
    const gridContainer = document.getElementById('gridContainer');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const gameMessage = document.getElementById('gameMessage');

    // 初始化网格 (所有格子为 0)
    function initGrid() {
      grid = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
    }

    // 重置游戏
    function resetGame() {
      initGrid();
      score = 0;
      gameOver = false;
      win = false;
      gameMessage.textContent = '';
      gameMessage.className = 'game-message';
      // 生成两个初始方块
      spawnTile();
      spawnTile();
      render();
      updateScore();
    }

    // 在随机空位生成新方块 (90% 概率 2, 10% 概率 4)
    function spawnTile() {
      const empty = [];
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (grid[r][c] === 0) empty.push([r, c]);
        }
      }
      if (empty.length === 0) return false;
      const [row, col] = empty[Math.floor(Math.random() * empty.length)];
      const value = Math.random() < 0.9 ? 2 : 4;
      grid[row][col] = value;
      return true;
    }

    // 渲染网格
    function render() {
      // 清空容器，重新生成 16 个格子
      gridContainer.innerHTML = '';
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          const val = grid[r][c];
          if (val !== 0) {
            cell.textContent = val;
            // 添加对应数字的样式类
            let tileClass = '';
            if (val <= 2048) {
              tileClass = 'tile-' + val;
            } else {
              tileClass = 'tile-super';
            }
            cell.classList.add(tileClass);
          } else {
            cell.textContent = '';
          }
          gridContainer.appendChild(cell);
        }
      }
    }

    // 更新分数显示
    function updateScore() {
      scoreDisplay.textContent = score;
    }

    // ---------- 移动逻辑 (核心) ----------
    // 向左滑动 (每一行独立处理)
    function slideRowLeft(row) {
      // 去掉零
      let filtered = row.filter(val => val !== 0);
      // 合并相邻相同数字
      let merged = [];
      let i = 0;
      while (i < filtered.length) {
        if (i + 1 < filtered.length && filtered[i] === filtered[i+1]) {
          merged.push(filtered[i] * 2);
          score += filtered[i] * 2;
          i += 2;
        } else {
          merged.push(filtered[i]);
          i++;
        }
      }
      // 补零到 SIZE
      while (merged.length < SIZE) {
        merged.push(0);
      }
      return merged;
    }

    // 获取矩阵转置 (用于上下方向)
    function transpose(matrix) {
      const result = Array.from({ length: SIZE }, (_, i) => 
        Array.from({ length: SIZE }, (_, j) => matrix[j][i])
      );
      return result;
    }

    // 反转行 (用于右/下方向)
    function reverseRows(matrix) {
      return matrix.map(row => [...row].reverse());
    }

    // 执行向左移动
    function moveLeft() {
      let moved = false;
      for (let r = 0; r < SIZE; r++) {
        const originalRow = [...grid[r]];
        const newRow = slideRowLeft(originalRow);
        if (originalRow.join(',') !== newRow.join(',')) {
          moved = true;
        }
        grid[r] = newRow;
      }
      return moved;
    }

    // 执行向右移动 (反转行 -> 左移 -> 反转)
    function moveRight() {
      grid = reverseRows(grid);
      const moved = moveLeft();
      grid = reverseRows(grid);
      return moved;
    }

    // 执行向上移动 (转置 -> 左移 -> 转置)
    function moveUp() {
      grid = transpose(grid);
      const moved = moveLeft();
      grid = transpose(grid);
      return moved;
    }

    // 执行向下移动 (转置 -> 右移 -> 转置)  或 转置+反转组合
    function moveDown() {
      grid = transpose(grid);
      const moved = moveRight();
      grid = transpose(grid);
      return moved;
    }

    // ---------- 检查游戏是否结束 ----------
    function isGameOver() {
      // 如果有空位 或 有相邻相同数字 => 未结束
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (grid[r][c] === 0) return false;
          if (c < SIZE - 1 && grid[r][c] === grid[r][c+1]) return false;
          if (r < SIZE - 1 && grid[r][c] === grid[r+1][c]) return false;
        }
      }
      return true;
    }

    // 检查是否获胜 (出现 2048)
    function checkWin() {
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (grid[r][c] === 2048) return true;
        }
      }
      return false;
    }

    // ---------- 处理移动 (封装) ----------
    function handleMove(direction) {
      if (gameOver) {
        // 如果已经结束，仍然可以操作但会提示，但为了避免误触，我们只显示信息，不移动
        gameMessage.textContent = '游戏已结束，点击“新游戏”重新开始';
        gameMessage.className = 'game-message lose';
        return;
      }

      let moved = false;
      switch (direction) {
        case 'left':  moved = moveLeft(); break;
        case 'right': moved = moveRight(); break;
        case 'up':    moved = moveUp(); break;
        case 'down':  moved = moveDown(); break;
        default: return;
      }

      if (moved) {
        // 生成新方块
        const spawned = spawnTile();
        // 更新 UI
        render();
        updateScore();

        // 检查胜利 (仅当未胜利时)
        if (!win && checkWin()) {
          win = true;
          gameMessage.textContent = '🎉 你赢了！继续挑战吧！';
          gameMessage.className = 'game-message win';
        }

        // 检查失败
        if (isGameOver()) {
          gameOver = true;
          if (!win) {
            gameMessage.textContent = '😵 游戏结束！点击“新游戏”重来';
            gameMessage.className = 'game-message lose';
          } else {
            // 如果胜利后继续移动导致失败，显示胜利+结束
            gameMessage.textContent = '🏆 胜利并结束！点击“新游戏”重来';
            gameMessage.className = 'game-message win';
          }
        } else {
          // 如果游戏没有结束，但之前可能显示过胜利或消息，清空普通消息 (保留胜利消息)
          if (!win) {
            gameMessage.textContent = '';
            gameMessage.className = 'game-message';
          } else {
            // 胜利后继续玩，保留胜利消息
            gameMessage.textContent = '🎉 你赢了！继续挑战吧！';
            gameMessage.className = 'game-message win';
          }
        }
      } else {
        // 未移动: 可给予轻微提示 (但不干扰)
        if (!gameOver && !win) {
          gameMessage.textContent = '无法移动';
          gameMessage.className = 'game-message';
          setTimeout(() => {
            if (!gameOver && !win) {
              gameMessage.textContent = '';
              gameMessage.className = 'game-message';
            }
          }, 300);
        }
      }
    }

    // ---------- 键盘事件 ----------
    function onKeydown(e) {
      const key = e.key;
      // 阻止箭头滚动 / 页面滚动
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(key)) {
        e.preventDefault();
      }
      switch (key) {
        case 'ArrowLeft':  handleMove('left'); break;
        case 'ArrowRight': handleMove('right'); break;
        case 'ArrowUp':    handleMove('up'); break;
        case 'ArrowDown':  handleMove('down'); break;
        default: return;
      }
    }

    // ---------- 触摸事件 (移动端) ----------
    let touchStartX = 0, touchStartY = 0;
    let isSwiping = false;

    function onTouchStart(e) {
      const touch = e.touches[0];
      if (!touch) return;
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
      isSwiping = true;
    }

    function onTouchEnd(e) {
      if (!isSwiping) return;
      isSwiping = false;
      // 获取结束触摸点 (使用 changedTouches)
      const touch = e.changedTouches[0];
      if (!touch) return;
      const deltaX = touch.clientX - touchStartX;
      const deltaY = touch.clientY - touchStartY;
      const absX = Math.abs(deltaX);
      const absY = Math.abs(deltaY);
      if (Math.max(absX, absY) < 20) return; // 太短的滑动忽略

      if (absX > absY) {
        if (deltaX > 0) handleMove('right');
        else handleMove('left');
      } else {
        if (deltaY > 0) handleMove('down');
        else handleMove('up');
      }
    }

    // ---------- 初始化 & 事件绑定 ----------
    function init() {
      resetGame();

      // 键盘
      window.addEventListener('keydown', onKeydown);

      // 触摸
      gridContainer.addEventListener('touchstart', onTouchStart, { passive: true });
      gridContainer.addEventListener('touchend', onTouchEnd, { passive: true });

      // 新游戏按钮
      document.getElementById('newGameBtn').addEventListener('click', function() {
        resetGame();
        // 重置后清除可能的消息
        gameMessage.textContent = '';
        gameMessage.className = 'game-message';
      });
    }

    // 页面完全加载后启动
    if (document.readyState === 'complete') {
      init();
    } else {
      window.addEventListener('load', init);
    }
  })();
</script>
</body>
</html>
